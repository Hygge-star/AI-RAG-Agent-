<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>智能知识库助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主容器 - 类似移动端卡片效果，自适应桌面 */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 700px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 16px;
        }

        /* 头部 */
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #e9ecef;
            background: white;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2c3e66, #1a4c8c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .chat-header p {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 4px;
        }

        /* 消息区域 - 自动滚动 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 0 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* 消息气泡公用 */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 用户消息 - 右对齐 */
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        /* 头像/图标 */
        .avatar {
            width: 32px;
            height: 32px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #2c3e66;
            color: white;
        }

        /* 气泡内容 */
        .bubble {
            background: #f1f3f5;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            font-size: 0.95rem;
            word-break: break-word;
            color: #1e293b;
        }

        .message.user .bubble {
            background: #2c3e66;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: #f1f3f5;
            border-bottom-left-radius: 4px;
        }

        /* 加载动画（三个点） */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 6px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #6c757d;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* 底部输入区 */
        .input-area {
            padding: 16px 20px 20px 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f8f9fa;
            border-radius: 32px;
            padding: 8px 12px;
            border: 1px solid #e9ecef;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #2c3e66;
            box-shadow: 0 0 0 2px rgba(44,62,102,0.1);
        }

        textarea {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            max-height: 120px;
            padding: 6px 0;
            line-height: 1.4;
        }

        button {
            background: #2c3e66;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        button:hover {
            background: #1f2e4a;
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        /* 错误提示 */
        .error-message {
            background: #fff5f5;
            color: #c92a2a;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 8px;
        }

        /* 欢迎占位 */
        .welcome-tip {
            text-align: center;
            color: #868e96;
            font-size: 0.85rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>📚 知识库助手</h1>
        <p>基于企业知识库的智能问答 · 即问即答</p>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">你好！我是知识库助手，你可以问我关于产品、技术文档、内部流程等任何问题，我会基于知识库给出答案。</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="questionInput" rows="1" placeholder="输入你的问题..." aria-label="提问"></textarea>
            <button id="sendBtn" aria-label="发送">➤</button>
        </div>
        <div id="errorHint" class="error-message" style="display: none;"></div>
    </div>
</div>

<script>
    // ---- 后端 API 地址（可配置，默认相对路径 /api/chat）----
    // 生产环境使用相同域名下的 API 路径，开发时可通过代理或配置完整地址
    const API_URL = '/api/chat';

    // DOM 元素
    const messagesContainer = document.getElementById('messagesArea');
    const questionInput = document.getElementById('questionInput');
    const sendButton = document.getElementById('sendBtn');
    const errorHint = document.getElementById('errorHint');

    // 状态锁，防止重复发送
    let isLoading = false;

    // 自动调整文本框高度
    function autoResizeTextarea() {
        questionInput.style.height = 'auto';
        questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
    }

    // 滚动到底部
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 显示错误提示（3秒后自动隐藏）
    function showError(msg) {
        errorHint.textContent = msg;
        errorHint.style.display = 'block';
        setTimeout(() => {
            errorHint.style.display = 'none';
        }, 3000);
    }

    // 添加一条消息到界面 (type: 'user' 或 'assistant', content: 字符串)
    function addMessage(type, content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;

        const avatarSpan = document.createElement('div');
        avatarSpan.className = 'avatar';
        avatarSpan.textContent = type === 'user' ? '👤' : '🤖';

        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        // 支持简单的换行渲染（保留空白符）
        bubbleDiv.textContent = content;

        messageDiv.appendChild(avatarSpan);
        messageDiv.appendChild(bubbleDiv);
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv;
    }

    // 添加“正在输入”占位符
    let typingIndicator = null;
    function showTyping() {
        if (typingIndicator) return;
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="avatar">🤖</div>
            <div class="bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        messagesContainer.appendChild(div);
        scrollToBottom();
        typingIndicator = div;
    }

    function hideTyping() {
        if (typingIndicator) {
            typingIndicator.remove();
            typingIndicator = null;
        }
    }

    // 核心发送逻辑
    async function sendQuestion() {
        if (isLoading) return;

        const question = questionInput.value.trim();
        if (question === '') {
            showError('请输入问题后再发送～');
            return;
        }

        // 清空输入框并重置高度
        questionInput.value = '';
        autoResizeTextarea();
        // 禁用发送按钮和输入框
        isLoading = true;
        sendButton.disabled = true;
        questionInput.disabled = true;

        // 添加用户消息
        addMessage('user', question);

        // 显示加载动画
        showTyping();

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000); // 30秒超时

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                },
                body: JSON.stringify({ question: question }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (!response.ok) {
                let errorDetail = `请求失败 (${response.status})`;
                try {
                    const errData = await response.json();
                    errorDetail = errData.detail || errData.message || errorDetail;
                } catch (e) {}
                throw new Error(errorDetail);
            }

            const data = await response.json();
            // 后端响应格式约定：{ answer: "回答内容" }，兼容其他字段
            const answer = data.answer || data.response || data.result || "已收到问题，但知识库未返回有效答案。";
            hideTyping();
            addMessage('assistant', answer);
        } catch (err) {
            hideTyping();
            let errorMsg = '网络或服务异常，请稍后重试';
            if (err.name === 'AbortError') {
                errorMsg = '请求超时，后端服务可能响应较慢';
            } else if (err.message) {
                errorMsg = err.message;
            }
            showError(errorMsg);
            // 可选：在对话里展示一个系统错误提示
            addMessage('assistant', `❌ 出错啦：${errorMsg}，请检查后端服务是否正常。`);
        } finally {
            isLoading = false;
            sendButton.disabled = false;
            questionInput.disabled = false;
            questionInput.focus();
            autoResizeTextarea();
        }
    }

    // 事件绑定
    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendQuestion();
        }
    });
    questionInput.addEventListener('input', autoResizeTextarea);

    // 初始调整高度
    autoResizeTextarea();
    questionInput.focus();
</script>
</body>
</html>
